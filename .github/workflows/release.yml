name: Release MySync

on:
    push:
        tags:
            - "*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Validate tag matches manifest version
              shell: bash
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  VERSION="$(node -p "require('./manifest.json').version")"
                  
                  echo "Tag: $TAG"
                  echo "Manifest version: $VERSION"
                  
                  if [ "$TAG" != "$VERSION" ]; then
                    echo "Tag does not match manifest.json version"
                    exit 1
                  fi

            - name: Build plugin
              run: npm run build

            - name: Verify required release files
              shell: bash
              run: |
                  test -f main.js || (echo "main.js not found" && exit 1)
                  test -f manifest.json || (echo "manifest.json not found" && exit 1)

            - name: Create GitHub release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  
                  FILES="main.js manifest.json"
                  
                  if [ -f styles.css ]; then
                    FILES="$FILES styles.css"
                  fi
                  
                  gh release create "$TAG" \
                    --title="$TAG" \
                    --draft \
                    --generate-notes \
                    $FILES
