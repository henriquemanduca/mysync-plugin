name: Release MySync

on:
    push:
        tags:
            - "*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Validate tag matches manifest version
              shell: bash
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./manifest.json', 'utf8')).version")"
                  
                  echo "Tag: $TAG"
                  echo "Manifest version: $VERSION"
                  
                  if [ "$TAG" != "$VERSION" ]; then
                    echo "::error::Tag does not match manifest.json version"
                    exit 1
                  fi

            - name: Build plugin
              run: npm run build

            - name: Inspect dist output
              shell: bash
              run: |
                  echo "Contents of dist/:"
                  ls -la dist || true

            - name: Verify release assets
              shell: bash
              run: |
                  test -f dist/main.js || (echo "::error::dist/main.js not found" && exit 1)
                  test -f dist/manifest.json || (echo "::error::dist/manifest.json not found" && exit 1)
                  
                  if [ -f styles.css ] && [ ! -f dist/styles.css ]; then
                    echo "::error::styles.css exists in repo but dist/styles.css was not generated"
                    exit 1
                  fi

            - name: Create zip package
              shell: bash
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  mkdir -p release-package
                  cp dist/main.js release-package/main.js
                  cp dist/manifest.json release-package/manifest.json
                  
                  if [ -f dist/styles.css ]; then
                    cp dist/styles.css release-package/styles.css
                  fi
                  
                  cd release-package
                  zip -r "../mysync-${TAG}.zip" .

            - name: Create GitHub release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  
                  ASSETS=(
                    "dist/main.js#main.js"
                    "dist/manifest.json#manifest.json"
                    "mysync-${TAG}.zip#mysync-${TAG}.zip"
                  )
                  
                  if [ -f dist/styles.css ]; then
                    ASSETS+=("dist/styles.css#styles.css")
                  fi
                  
                  gh release create "$TAG" \
                    --title="$TAG" \
                    --draft \
                    --generate-notes \
                    "${ASSETS[@]}"
